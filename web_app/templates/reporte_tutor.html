<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Tutor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .contenedor { border: 1px solid #ccc; padding: 20px; max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #d1ecf1; }
        .alerta { color: red; font-weight: bold; }
        .zona-grafica { margin-top: 30px; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Reporte por Actividad (Tutor)</h2>
        
        <form method="POST">
            {% csrf_token %}
            <label for="actividad">Ingresa el nombre de la actividad (ej. Tarea1):</label><br><br>
            <input type="text" name="actividad" id="actividad" value="{{ actividad }}" required>
            <button type="submit">Generar Reporte</button>
        </form>

        {% if mensaje %}
            <p class="alerta">{{ mensaje }}</p>
        {% endif %}

        {% if datos_actividad %}
            <table>
                <thead>
                    <tr>
                        <th>Carnet del Estudiante</th>
                        <th>Nota Obtenida</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in datos_actividad %}
                    <tr>
                        <td>{{ item.carnet }}</td>
                        <td>{{ item.nota }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="zona-grafica">
                <canvas id="miGrafica"></canvas>
            </div>

            <script>
                // Recibimos los datos desde Python (Django)
                const etiquetas = {{ etiquetas_grafica|safe }};
                const datos = {{ datos_grafica|safe }};
                const nombreActividad = "{{ actividad }}";

                const ctx = document.getElementById('miGrafica').getContext('2d');
                new Chart(ctx, {
                    type: 'bar', // Tipo de gráfica (barras)
                    data: {
                        labels: etiquetas,
                        datasets: [{
                            label: 'Notas de ' + nombreActividad,
                            data: datos,
                            backgroundColor: 'rgba(54, 162, 235, 0.6)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100 // Límite máximo de la nota
                            }
                        }
                    }
                });
            </script>
        {% endif %}
    </div>
</body>
</html>
