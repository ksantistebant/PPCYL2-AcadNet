<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AcadNet - Iniciar Sesión</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center;
        }
        input { 
            width: 90%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .alerta { color: red; font-size: 0.9em; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Bienvenido a AcadNet</h2>
        <p>Por favor, ingresa tus credenciales</p>
        
        {% if mensaje %}
            <div class="alerta">{{ mensaje }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="usuario" placeholder="Usuario o Carnet" required>
            <input type="password" name="contrasena" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
