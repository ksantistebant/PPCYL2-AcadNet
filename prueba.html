<!DOCTYPE html>
<html lang="es">
    <head>
        <meta>
        <title>Prueba de carga de notas</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; }
            .contenedor { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 400px; }
            button { margin-top: 15px; padding: 10px 15px; cursor: pointer; }
        </style>
    </head>
    <body>
        <div class="contenedor">
        <h2>Subir Notas (Tutor)</h2>
        
        <form action="http://127.0.0.1:5000/cargar_archivo_notas" method="POST" enctype="multipart/form-data">
            
            <label for="archivo">Selecciona el archivo XML:</label><br><br>
            
            <input type="file" name="archivo" id="archivo" accept=".xml" required>
            
            <br>
            <button type="submit">Enviar al Servidor</button>
            
        </form>
    </div>
    </body>
</html>
